[pytest]
# Pytest configuration for Sleep Journal Codebase Analyzer

# Test discovery paths
testpaths = tests

# Patterns for test file discovery
python_files = test_*.py *_test.py

# Patterns for test function/method/class discovery
python_classes = Test*
python_functions = test_*

# Console output options
console_output_style = progress
addopts =
    # Show verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Enable strict markers (fail on unknown markers)
    --strict-markers
    # Show warnings
    -W default

# Code coverage options (when using pytest-cov)
# Usage: pytest --cov=core --cov=analyzers
[coverage:run]
source = core,analyzers
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions/classes
    integration: Integration tests across modules
    slow: Tests that take significant time to run
    ai: Tests that make actual LLM API calls (use sparingly)
